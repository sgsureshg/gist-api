name: gist-cicd

on:
  push:
    branches: 
      - solutions
      - main
  pull_request:
    branches: 
      - solutions
      - main

env:
  IMAGE_NAME: gist-api
  PYTHON_VERSION: '3.12'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/Checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          PYTHON_VERSION: ${{ env.PYTHON_VERSION}}

      - name: Install dependencies
        run: |
          python -m pip install -upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest -v

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout Code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-actions@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker build
        run: |
          docker build -t ${{ env.IMAGE_NAME}}:latest .

      - name: Docke push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }} / ${{ secrets.DOCKERHUB_PASSWORD }} / ${{ env.IMAGE_NAME}}:latest 